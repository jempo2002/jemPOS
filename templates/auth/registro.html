<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jemPOS - Registra tu negocio</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/auth-login.tailwind.js"></script>

  <!-- FontAwesome 6 CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="/static/css/registro.css" />
  <link rel="stylesheet" href="/static/css/global.css" />
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-6">

  <!-- â”€â”€ TARJETA PRINCIPAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
  <div class="w-full max-w-md animate-fade-up">

    <!-- LOGO TIPOGRAFICO -->
    <div class="text-center mb-5">
      <h1 class="text-3xl font-bold tracking-tight">
        <span class="text-ink">jem</span><span class="text-brand-500">POS</span>
      </h1>
      <p class="mt-1 text-xs text-muted font-medium">Tu punto de venta, en tus manos.</p>
    </div>

    <!-- TARJETA BLANCA -->
    <div class="bg-white rounded-2xl shadow-card border border-border px-6 pt-6 pb-7">

      <!-- Encabezado del formulario -->
      <div class="mb-4">
        <h2 class="text-lg font-bold text-ink">Registra tu negocio</h2>
        <p class="text-sm text-slate-600 mt-0.5">Completa los datos para activar tu cuenta gratuita.</p>
      </div>

      <!-- FORMULARIO -->
      <form id="formRegistro" method="POST" action="/registro" novalidate class="space-y-3">

        <!-- â”€â”€ Nombre del Dueno â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="nombre_dueno">
            Nombre del Dueno
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-user text-sm"></i>
            </span>
            <input
              id="nombre_dueno"
              name="nombre_dueno"
              type="text"
              placeholder="Ej. Carlos Rodriguez"
              autocomplete="name"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-4 py-2.5 text-sm text-ink placeholder-slate-500"
            />
          </div>
          <span id="err_nombre_dueno" class="field-error-msg"></span>
        </div>

        <!-- â”€â”€ Nombre del Negocio â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="nombre_negocio">
            Nombre del Negocio
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-shop text-sm"></i>
            </span>
            <input
              id="nombre_negocio"
              name="nombre_negocio"
              type="text"
              placeholder="Ej. Tienda Don Carlos"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-4 py-2.5 text-sm text-ink placeholder-slate-500"
            />
          </div>
          <span id="err_nombre_negocio" class="field-error-msg"></span>
        </div>

        <!-- â”€â”€ NIT / Cedula â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="nit">
            NIT / Cedula
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-id-card text-sm"></i>
            </span>
            <input
              id="nit"
              name="nit"
              type="text"
              placeholder="Ej. 900.123.456-7"
              inputmode="numeric"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-4 py-2.5 text-sm text-ink placeholder-slate-500"
            />
          </div>
          <span id="err_nit" class="field-error-msg"></span>
        </div>

        <!-- â”€â”€ Telefono â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="telefono">
            Telefono / WhatsApp
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-mobile-screen-button text-sm"></i>
            </span>
            <input
              id="telefono"
              name="telefono"
              type="tel"
              placeholder="Ej. 310 456 7890"
              inputmode="tel"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-4 py-2.5 text-sm text-ink placeholder-slate-500"
            />
          </div>
          <span id="err_telefono" class="field-error-msg"></span>
        </div>

        <!-- â”€â”€ Correo â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="correo">
            Correo electronico
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-envelope text-sm"></i>
            </span>
            <input
              id="correo"
              name="correo"
              type="email"
              placeholder="correo@ejemplo.com"
              autocomplete="email"
              inputmode="email"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-4 py-2.5 text-sm text-ink placeholder-slate-500"
            />
          </div>
          <span id="err_correo" class="field-error-msg"></span>
        </div>

        <!-- â”€â”€ Contrasena â”€â”€ -->
        <div>
          <label class="block text-xs font-semibold text-ink mb-1" for="contrasena">
            Contrasena
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted">
              <i class="fa-solid fa-lock text-sm"></i>
            </span>
            <input
              id="contrasena"
              name="contrasena"
              type="password"
              placeholder="Min. 8 caracteres"
              autocomplete="new-password"
              class="field-input w-full rounded-xl border border-border bg-surface pl-10 pr-10 py-2.5 text-sm text-ink placeholder-slate-500"
            />
            <button
              type="button"
              id="toggleBtn"
              class="toggle-pwd absolute inset-y-0 right-0 flex items-center pr-3.5 text-muted hover:text-brand-500 transition-colors duration-150"
              aria-label="Mostrar u ocultar contrasena"
            >
              <i id="eyeIcon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
          <span id="err_contrasena" class="field-error-msg"></span>
          <p class="mt-1 text-[11px] text-muted">
            <i class="fa-solid fa-circle-info mr-1 text-brand-400"></i>
            Para crear una contrasena segura combina mayusculas, minusculas, y numeros.
          </p>
        </div>

        <!-- â”€â”€ Divisor â”€â”€ -->
        <div class="border-t border-border !mt-4"></div>

        <!-- â”€â”€ Terminos â”€â”€ -->
        <label class="flex items-start gap-3 cursor-pointer !mt-3">
          <input
            id="acepta_terminos"
            type="checkbox"
            name="acepta_terminos"
            class="mt-0.5 h-4 w-4 rounded border-border accent-brand-500 flex-shrink-0"
          />
          <span class="text-xs text-muted leading-relaxed">
            Acepto los
            <a href="#" class="text-brand-500 font-medium underline underline-offset-2 hover:text-brand-600">
              Terminos y Condiciones
            </a>
            y la
            <a href="#" class="text-brand-500 font-medium underline underline-offset-2 hover:text-brand-600">
              Politica de Privacidad
            </a>
            de jemPOS.
          </span>
        </label>

        <!-- â”€â”€ BOTON PRINCIPAL â”€â”€ -->
        <button
          type="submit"
          class="btn-primary w-full flex items-center justify-center gap-2.5 rounded-2xl py-3.5 text-white font-bold text-base tracking-wide shadow-md !mt-4"
        >
          <i class="fa-solid fa-rocket"></i>
          Crear mi POS ahora
        </button>

      </form>
    </div>

    <!-- Footer login -->
    <p class="text-center text-xs text-muted mt-4">
      ¿Ya tienes una cuenta?
      <a href="/login" class="text-brand-500 font-semibold hover:text-brand-600 transition-colors">
        Iniciar sesion
      </a>
    </p>

  </div><!-- /max-w-md -->

  <!-- JS propio (al final del body) -->
  <script src="/static/js/registro.js"></script>

</body>
</html>
