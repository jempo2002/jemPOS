<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contrasena - jemPOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/auth-recovery.css" />
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-lg p-6">
    <h1 class="text-2xl font-bold text-slate-900">¿Olvidaste tu contrasena?</h1>
    <p class="text-sm text-slate-500 mt-2">Ingresa tu correo y te enviaremos un enlace de recuperacion.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-4 space-y-2">
          {% for category, message in messages %}
            <div class="rounded-xl px-4 py-3 text-sm {% if category == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200{% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="mt-5 space-y-4">
      <div>
        <label for="correo" class="block text-sm font-semibold text-slate-700 mb-1.5">Correo electronico</label>
        <input id="correo" name="correo" type="email" required autocomplete="email"
               class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
               placeholder="correo@ejemplo.com" />
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">
        Enviar enlace de recuperacion
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="{{ url_for('auth.login') }}" class="text-sm text-slate-500 hover:text-blue-600 transition-colors">Volver al Login</a>
    </div>
  </div>
</body>
</html>
